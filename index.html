<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoopDesk</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: linear-gradient(145deg, #0f172a, #1e293b);
        color: #f8fafc;
      }
      main {
        width: min(680px, 92vw);
        padding: 2rem;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 18px 45px rgba(2, 6, 23, 0.45);
      }
      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.5;
        color: #cbd5e1;
      }
      .badge {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.18);
        border: 1px solid rgba(14, 165, 233, 0.4);
        color: #7dd3fc;
        font-size: 0.85rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CoopDesk no ar</h1>
      <p>Deploy mínimo publicado para garantir funcionamento na Vercel.</p>
      <p>Esta é uma página fictícia de fallback enquanto a versão completa é configurada.</p>
      <span class="badge">Vercel Ready</span>
    </main>
  </body>
</html>
